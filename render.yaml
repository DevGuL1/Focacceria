services:
  - type: web
    name: focacceria
    runtime: python
    plan: starter            # 'starter' supports persistent disk for media; use 'free' for DB-only testing
    buildCommand: "./build.sh"
    startCommand: "gunicorn focacceria.wsgi:application"
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: focacceria-db
          property: connectionString
      - key: MEDIA_ROOT
        value: /var/data/media
      - key: DJANGO_SUPERUSER_USERNAME
        value: admin
      - key: DJANGO_SUPERUSER_EMAIL
        value: admin@focacceria.ge
      - key: DJANGO_SUPERUSER_PASSWORD
        generateValue: true
    disk:
      name: focacceria-media
      mountPath: /var/data
      sizeGB: 1

databases:
  - name: focacceria-db
    plan: free               # free Postgres (expires ~90 days); upgrade for production
    databaseName: focacceria
    user: focacceria
